<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Yangliduo Lai 的博客。" />
    <title>Blog | Yangliduo Lai</title>
    <link rel="stylesheet" href="assets/styles.css" />
    <script src="assets/script.js?v=20260618-blog-search" defer></script>
  </head>
  <body>
    <div class="page-shell" id="top">
      <canvas class="hero-canvas" data-graph-canvas aria-hidden="true"></canvas>

      <header class="site-header">
        <a class="brand" href="index.html" aria-label="Yangliduo Lai home">
          <span class="brand-mark">YL</span>
          <span>Yangliduo Lai</span>
        </a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="index.html">Home</a>
          <a href="index.html#research">Research</a>
          <a href="blog.html" aria-current="page">Blog</a>
        </nav>
      </header>

      <main class="content-wrap">
        <section class="blog-heading">
          <h1>Blogs</h1>
        </section>

        <section class="blog-layout">
          <section class="posts-area" aria-label="Blog posts">
            <section class="blog-list" data-blog-list></section>
            <nav class="pagination" data-pagination aria-label="Blog pagination"></nav>
          </section>

          <aside class="blog-sidebar" aria-label="Blog tools">
            <section class="tag-graph-card" aria-label="Filter posts by tag graph">
              <div class="tag-graph-header">
                <span class="tag-icon" aria-hidden="true"></span>
                <h2>Tag Map</h2>
              </div>
              <div class="tag-graph" data-tag-graph></div>
            </section>

            <section class="blog-tool-card" aria-label="Search posts">
              <div class="blog-tool-heading">
                <h2>Search</h2>
                <span data-blog-count></span>
              </div>
              <form class="blog-search" data-blog-search>
                <input
                  type="search"
                  name="q"
                  placeholder="Title, tag, summary"
                  autocomplete="off"
                  data-blog-search-input
                />
                <button type="submit">Search</button>
              </form>
              <div class="blog-stat-grid" data-blog-stats></div>
            </section>
          </aside>
        </section>

        <div class="filter-status blog-layout-status" data-filter-status></div>
      </main>

      <footer class="site-footer">
        <span>Yangliduo Lai</span>
        <a href="index.html">Home</a>
      </footer>
    </div>
  </body>
</html>
